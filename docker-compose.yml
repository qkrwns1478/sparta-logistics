# docker-compose.yml
version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:15
    container_name: sparta-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sparta-net

  # Redis (JWT Refresh Token + 허브/경로 캐싱)
  redis:
    image: redis:7.2
    container_name: sparta-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-data:/data
    networks:
      - sparta-net

  # TODO: Kafka 서비스 블록을 추가해야 합니다.

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: sparta-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - sparta-net

  # Zipkin
  zipkin:
    image: openzipkin/zipkin:3
    container_name: sparta-zipkin
    ports:
      - "9411:9411"
    networks:
      - sparta-net

volumes:
  postgres-data:
  redis-data:

networks:
  sparta-net:
    driver: bridge