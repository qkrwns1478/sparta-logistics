spring:
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS schema_hub
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: schema_hub

  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}

eureka:
  client:
    enabled: false