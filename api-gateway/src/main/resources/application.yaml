server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "http://localhost:3000"
                  - "http://localhost:8080"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                exposedHeaders:
                  - "Authorization"
                  - "X-Refresh-Token"
                allowCredentials: true
          routes:
            # internal 경로 차단
            - id: product-internal-block
              uri: no://op
              predicates:
                - Path=/api/v1/products/internal/**
              filters:
                - SetStatus=404

            # user - service
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**, /api/v1/users/**

            # hub - service
            - id: hub-service
              uri: lb://hub-service
              predicates:
                - Path=/api/v1/hubs/**, /api/v1/hub-routes/**

            # company - service
            - id: company-service
              uri: lb://company-service
              predicates:
                - Path=/api/v1/companies/**

            # product - service
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/v1/products/**

            # order - service
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**

            # delivery - service
            - id: delivery-service
              uri: lb://delivery-service
              predicates:
                - Path=/api/v1/deliveries/**, /api/v1/delivery-managers/**

            # slack - service
            - id: slack-service
              uri: lb://slack-service
              predicates:
                - Path=/api/v1/slack-messages/**, /api/v1/ai-logs/**

            # user-service swagger docs
            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - Path=/api-docs/user

