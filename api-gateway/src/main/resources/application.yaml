eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "metrics"
  tracing:
    sampling:
      probability: 1.0 #(개발/테스트에서는 주로 1.0, 실제 운영 환경에서는 서버 부하를 위해 수치를 낮춤)
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}



jwt:
  secret-key: ${JWT_SECRET:aGVsbG9Xb3JsZFNlY3JldEtleUZvckpXVEF1dGgxMjM0NTY=}

