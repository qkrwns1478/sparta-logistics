name:  : Backend CI (ArcUnit Test)

# 액션을 실행할 상황 정의
on:
  pull_request:
    branches: [ "main", "dev"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      #1. GitHub의 코드를 가상환경으로 가져오기
      - name: Checkout Repository
        uses: actions/checkout@v3

      #2. Java 17 환경 세팅
      - name : Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      #3. Gradle 빌드 도구에 실행 권한을 부여
      - name: Grane excute permission for gradlew
        run: chmod +x gradlew

      #4. 전체 서비스의 테스트 코드 실행(ArchUnit 검증 포함)
      - name: Run Tests
        run: ./gradlew test
