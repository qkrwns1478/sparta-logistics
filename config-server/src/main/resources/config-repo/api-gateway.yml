server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "http://localhost:3000"
                  - "http://localhost:8080"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                exposedHeaders:
                  - "Authorization"
                  - "X-Refresh-Token"
                allowCredentials: true
          routes:
            # internal 경로 차단
            - id: product-internal-block
              uri: no://op
              predicates:
                - Path=/api/v1/products/internal/**
              filters:
                - SetStatus=404

            # user-service
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**, /api/v1/users/**

            # hub-service
            - id: hub-service
              uri: lb://hub-service
              predicates:
                - Path=/api/v1/hubs/**, /api/v1/hub-routes/**

            # company-service
            - id: company-service
              uri: lb://company-service
              predicates:
                - Path=/api/v1/companies/**

            # product-service
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/v1/products/**

            # order-service
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**

            # delivery-service
            - id: delivery-service
              uri: lb://delivery-service
              predicates:
                - Path=/api/v1/deliveries/**, /api/v1/delivery-managers/**, /api/v1/delivery-routes/**

            # slack-service
            - id: slack-service
              uri: lb://slack-service
              predicates:
                - Path=/api/v1/slack-messages/**, /api/v1/ai-logs/**

            # swagger docs
            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - Path=/v3/api-docs/user

            - id: hub-service-docs
              uri: lb://hub-service
              predicates:
                - Path=/v3/api-docs/hub

            - id: company-service-docs
              uri: lb://company-service
              predicates:
                - Path=/v3/api-docs/company

            - id: product-service-docs
              uri: lb://product-service
              predicates:
                - Path=/v3/api-docs/product

            - id: order-service-docs
              uri: lb://order-service
              predicates:
                - Path=/v3/api-docs/order

            - id: delivery-service-docs
              uri: lb://delivery-service
              predicates:
                - Path=/v3/api-docs/delivery

            - id: slack-service-docs
              uri: lb://slack-service
              predicates:
                - Path=/v3/api-docs/slack

management:
  endpoints:
    web:
      exposure:
        include: "metrics"
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

jwt:
  secret-key: ${JWT_SECRET}

springdoc:
  swagger-ui:
    urls:
      - name: user
        url: /v3/api-docs/user
      - name: hub
        url: /v3/api-docs/hub
      - name: company
        url: /v3/api-docs/company
      - name: product
        url: /v3/api-docs/product
      - name: order
        url: /v3/api-docs/order
      - name: delivery
        url: /v3/api-docs/delivery
      - name: slack
        url: /v3/api-docs/slack

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  include-application-name: false
