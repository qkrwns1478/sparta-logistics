server:
  port: 19096

spring:
  application:
    name: delivery-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    # schema_delivery 설정
    url: jdbc:postgresql://localhost:5432/logistics?currentSchema=schema_delivery
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: schema_delivery
        format_sql: true
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 5000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${server.port}:${random.value}
    prefer-ip-address: true # 서비스 간 통신 시 호스트명 대신 IP 주소를 사용하도록 강제 (네트워크 에러 방지)


#management:
#  tracing:
#    sampling:
#      probability: 1.0
#  zipkin:
#    base-url: http://localhost:9411/

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.sparta.logistics.delivery: DEBUG
    org.hibernate.sql: DEBUG